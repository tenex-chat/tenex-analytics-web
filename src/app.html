<!doctype html>
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="TENEX Analytics Dashboard - LLM token usage, cache efficiency, and cost visualization" />
		<title>TENEX Analytics</title>
		<script>
			// Prevent flash of unstyled content: apply theme before page renders
			(function () {
				try {
					const stored = localStorage.getItem('theme');
					const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					const theme = stored || (prefersDark ? 'dark' : 'light');
					if (theme === 'dark') {
						document.documentElement.classList.add('dark');
					} else {
						document.documentElement.classList.remove('dark');
					}
				} catch (e) {
					// localStorage not available (SSR or private mode); default to dark
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-gray-950 text-gray-100 min-h-screen">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
